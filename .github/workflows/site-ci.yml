name: Site Generator CI

on:
  push:
    paths:
      - '.github/workflows/site-ci.yml'
      - 'tools/site-generator/**'
      - 'tools/landing/**'
      - 'spec/**'
      - 'docs/**'
      - 'blog/**'
  pull_request:
    paths:
      - '.github/workflows/site-ci.yml'
      - 'tools/site-generator/**'
      - 'tools/landing/**'
      - 'spec/**'
      - 'docs/**'
      - 'blog/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            tools/site-generator/pnpm-lock.yaml
            tools/landing/pnpm-lock.yaml

      - name: Install site-generator dependencies
        working-directory: tools/site-generator
        run: pnpm install --frozen-lockfile

      # No headless browser install needed — Mermaid renders client-side from a CDN.

      - name: Run site-generator tests
        working-directory: tools/site-generator
        run: pnpm test

      - name: Build docs site (emits public/)
        working-directory: tools/site-generator
        run: pnpm build

      # --- Landing page (Astro, owns the homepage at `/`) ---
      # The landing is a separate Astro sub-project that ships only one route.
      # We build it after the docs site so its `index.html` overwrites the
      # docs-style landing the site-generator emits. Everything else in
      # public/ (docs pages, blog, ideas, install scripts) keeps coming
      # from the site-generator unchanged. See tools/landing/README.md.

      - name: Install landing dependencies
        working-directory: tools/landing
        run: pnpm install --frozen-lockfile

      - name: Build landing (Astro)
        working-directory: tools/landing
        run: pnpm build

      - name: Merge landing into public/ (Astro index.html wins)
        run: cp -r tools/landing/dist/. public/

      - name: Verify no unrendered mermaid fences in HTML
        run: |
          if grep -r '```mermaid' public/*.html; then
            echo "ERROR: Found unrendered mermaid fences in HTML output"
            exit 1
          fi

      - name: Verify mermaid blocks present and loader script wired
        run: |
          for f in public/feature-specification.html public/plan-specification.html; do
            if ! grep -q '<pre class="mermaid">' "$f"; then
              echo "ERROR: No <pre class=\"mermaid\"> block in $f"
              exit 1
            fi
            if ! grep -q 'mermaid.esm.min.mjs' "$f"; then
              echo "ERROR: Mermaid loader script not present in $f"
              exit 1
            fi
          done

      - name: Verify Cloudflare-only config not bundled into build output
        run: |
          if [ -f public/_headers ] || [ -f public/_redirects ]; then
            echo "ERROR: _headers/_redirects must not be inside public/ (Cloudflare-only files)"
            exit 1
          fi

      # Deployment is handled by Cloudflare Pages' Git integration
      # (configured in the CF dashboard; builds via tools/cf-build.sh on every
      # push to main). This workflow only builds, tests, and verifies the site
      # as CI — it does not deploy. The retired Firebase Hosting fallback
      # (Authenticate to GCP + Deploy to Firebase Hosting) was removed on
      # 2026-05-29; its GCP Workload Identity auth had broken after the org
      # rename and Firebase is no longer a deploy target.
