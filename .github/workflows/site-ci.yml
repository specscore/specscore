name: Site Generator CI

on:
  push:
    paths:
      - '.github/workflows/site-ci.yml'
      - 'tools/site-generator/**'
      - 'spec/**'
      - 'docs/**'
      - 'blog/**'
  pull_request:
    paths:
      - '.github/workflows/site-ci.yml'
      - 'tools/site-generator/**'
      - 'spec/**'
      - 'docs/**'
      - 'blog/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tools/site-generator/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tools/site-generator
        run: pnpm install --frozen-lockfile

      # No headless browser install needed — Mermaid renders client-side from a CDN.

      - name: Run tests
        working-directory: tools/site-generator
        run: pnpm test

      - name: Build site
        working-directory: tools/site-generator
        run: pnpm build

      - name: Verify no unrendered mermaid fences in HTML
        run: |
          if grep -r '```mermaid' public/*.html; then
            echo "ERROR: Found unrendered mermaid fences in HTML output"
            exit 1
          fi

      - name: Verify mermaid blocks present and loader script wired
        run: |
          for f in public/feature-specification.html public/plan-specification.html; do
            if ! grep -q '<pre class="mermaid">' "$f"; then
              echo "ERROR: No <pre class=\"mermaid\"> block in $f"
              exit 1
            fi
            if ! grep -q 'mermaid.esm.min.mjs' "$f"; then
              echo "ERROR: Mermaid loader script not present in $f"
              exit 1
            fi
          done

      - name: Verify Cloudflare config not in Firebase artifact
        run: |
          if [ -f public/_headers ] || [ -f public/_redirects ]; then
            echo "ERROR: _headers/_redirects must not be inside public/ (Cloudflare-only files)"
            exit 1
          fi

      - name: Authenticate to GCP
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          NODE_NO_WARNINGS: 1
        run: pnpm --config.onlyBuiltDependencies='["protobufjs","re2"]' dlx firebase-tools@latest deploy --only hosting:specscore-org --non-interactive
